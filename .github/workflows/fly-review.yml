name: Fly Review App

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: write

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_ORG: ${{ vars.FLY_ORG || 'personal' }}
  FLY_REGION: ${{ vars.FLY_REGION || 'iad' }}
  NEON_BRANCH: preview/pr-${{ github.event.number }}-${{ github.event.pull_request.head.ref }}

jobs:
  review_app:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: fly-review-pr-${{ github.event.number }}
      cancel-in-progress: true
    environment:
      name: review-pr-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Validate Fly review app settings
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          REVIEW_ADMIN_PASSWORD: ${{ secrets.REVIEW_ADMIN_PASSWORD }}
          REVIEW_JWT_ACCESS_SECRET: ${{ secrets.REVIEW_JWT_ACCESS_SECRET }}
          REVIEW_JWT_REFRESH_SECRET: ${{ secrets.REVIEW_JWT_REFRESH_SECRET }}
        run: |
          missing=0

          require() {
            if [ -z "${!1}" ]; then
              echo "::error::$2"
              missing=1
            fi
          }

          require FLY_API_TOKEN "Set the FLY_API_TOKEN repository secret to a Fly.io org token."
          require NEON_API_KEY "Set the NEON_API_KEY repository secret created by the Neon GitHub integration."
          require NEON_PROJECT_ID "Set the NEON_PROJECT_ID repository variable created by the Neon GitHub integration."
          require REVIEW_ADMIN_PASSWORD "Set the REVIEW_ADMIN_PASSWORD repository secret for seeded review admin logins."
          require REVIEW_JWT_ACCESS_SECRET "Set the REVIEW_JWT_ACCESS_SECRET repository secret."
          require REVIEW_JWT_REFRESH_SECRET "Set the REVIEW_JWT_REFRESH_SECRET repository secret."

          exit "$missing"

      - name: Get code
        uses: actions/checkout@v4

      - name: Get branch expiration date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.NEON_BRANCH }}
          role: ${{ vars.NEON_DATABASE_ROLE || 'neondb_owner' }}
          database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      # This action imports `secrets` before `fly deploy`, so release_command sees DATABASE_URL.
      - name: Deploy PR app to Fly.io
        id: deploy
        uses: superfly/fly-pr-review-apps@1.5.0
        with:
          name: pmis-pr-${{ github.event.number }}
          config: fly.review.toml
          memory: 512
          secrets: DATABASE_URL=${{ steps.create_neon_branch.outputs.db_url_pooled }} ADMIN_EMAIL=${{ vars.REVIEW_ADMIN_EMAIL || 'admin@example.com' }} ADMIN_PASSWORD=${{ secrets.REVIEW_ADMIN_PASSWORD }} JWT_ACCESS_SECRET=${{ secrets.REVIEW_JWT_ACCESS_SECRET }} JWT_REFRESH_SECRET=${{ secrets.REVIEW_JWT_REFRESH_SECRET }}

      - name: Comment with Fly.io review app URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          REVIEW_APP_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- fly-review-app-url -->';
            const reviewAppUrl = (process.env.REVIEW_APP_URL || '').trim().split(/\s+/)[0];
            if (!reviewAppUrl) {
              core.warning('Fly.io review app URL was empty after sanitization; skipping PR comment.');
              return;
            }

            const body = [
              marker,
              `Fly.io review app: [${reviewAppUrl}](${reviewAppUrl})`,
              '',
              'This comment is updated after each successful review-app deployment.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existingComment = comments.find(
                (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning('GitHub token cannot write PR comments; skipping Fly.io review app comment.');
                return;
              }
              throw error;
            }

  destroy_review_app:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: fly-review-pr-${{ github.event.number }}
      cancel-in-progress: true

    steps:
      - name: Validate Fly review app teardown settings
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::Set the FLY_API_TOKEN repository secret to a Fly.io org token."
            exit 1
          fi

      - name: Destroy PR app on Fly.io
        uses: superfly/fly-pr-review-apps@1.5.0
        with:
          name: pmis-pr-${{ github.event.number }}
