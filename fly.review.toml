# Fly.io review app configuration used by .github/workflows/fly-review.yml.
# The GitHub action deploys this config with a per-PR app name.

primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'node dist/scripts/run-migrations.js && node dist/seed/seed.js'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
