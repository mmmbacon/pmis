services:
  db:
    image: postgres:16-alpine
    container_name: timesheet-manager-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: timesheets_dev
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d timesheets_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  pg_data:
